<html lang="pt-br">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Mesh Background — convert_ID_GEN</title>
<link rel="preconnect" href="https://api.fontshare.com" crossorigin />
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; height: 100%; background: #04141a; }
  #mesh-bg { position: fixed; inset: 0; width: 100%; height: 100%; display: block; }

  /* Indicadores topográficos (lado esquerdo) */
  #mesh-markers { position: fixed; inset: 0; pointer-events: none; z-index: 1; overflow: hidden; }
  #mesh-links { position: fixed; inset: 0; width: 100%; height: 100%; overflow: visible; }
  #mesh-links line { fill: none; stroke-width: 1; }
  #mesh-markers .mk {
    position: fixed; left: 0; top: 0; opacity: 0;
    will-change: transform, opacity;
    transition: opacity .12s linear;
  }
  #mesh-markers .mk-dot {
    position: absolute; left: -2px; top: -2px; width: 4px; height: 4px;
    border-radius: 50%; background: #89d6bc;
  }
  #mesh-markers .mk-lead {
    position: absolute; left: 4px; top: 0; width: 7px; height: 1px;
    background: rgba(137,214,188,.45);
  }
  #mesh-markers .mk-txt {
    position: absolute; left: 13px; top: -5.5px; white-space: nowrap;
    font-family: 'Satoshi', sans-serif; font-weight: 400; font-size: 10px;
    line-height: 1; letter-spacing: .6px; color: rgba(137,214,188,.72);
    text-shadow: 0 0 4px rgba(4,20,26,.9);
  }
</style>
</head>
<body>
<!-- ====== COMO EMBUTIR NO SEU SITE ======
  1. Cole o <canvas> abaixo onde quiser o fundo (ou deixe fixed em tela cheia).
  2. Cole os DOIS <script> abaixo (o runtime + o mount).
  3. Estilize o #mesh-bg como quiser (position: fixed/absolute, z-index: -1, etc).
  Sem dependências, sem build.

  PERFORMANCE (no objeto CONFIG abaixo). As LINHAS são vetoriais → nítidas em
  qualquer resolução; o custo está na GRADE de amostragem (gridCols), não na res.
  - gridCols: nº de amostras da grade. MENOS = mais rápido (forma mais facetada),
    MAIS = mais suave/pesado. Padrão 480. É o principal botão de performance.
  - maxWidth: teto do lado maior do buffer (px, já com DPR). Nitidez. Padrão 2560.
  - maxDpr:   teto de devicePixelRatio do buffer. Padrão 2.
  - fps:      teto de quadros por segundo. Padrão 30.

======================================== -->

        bx: bestCol * d.cell, by: bestRow * d.cell };
    }

    // Nasce: escolhe uma linha (nível) que realmente exista na faixa esquerda.
    function spawn(mk, d, occ, minGX, minGY, yMin, yMax) {
      for (var k = 0; k < 28; k++) {
        var lb = Math.random();
        var target = d.hMin + d.span * ((((lb + d.flow) % 1) + 1) % 1);
        var pc = rr(SPAWN_MIN, SPAWN_MAX), pr = rr(yMin, yMax);
        var spawnSpan = Math.max(4, Math.round(0.05 * (d.cols - 1))); // confina ao CENTRO
        var p = findOnLevel(d, target, pc, pr, spawnSpan, d.rows);
        if (!p || p.colN > SPAWN_MAX + 0.02) continue;   // nunca à direita do centro
        if (p.rowN < yMin || p.rowN > yMax) continue;    // área visível (margem 150px)
        var ok = true;                                    // espaçamento mín. 15px em X e Y
        for (var oi = 0; oi < occ.length; oi++) {
          if (Math.abs(p.colN - occ[oi].colN) < minGX || Math.abs(p.rowN - occ[oi].rowN) < minGY) { ok = false; break; }
        }
        if (!ok) continue;
        mk.levelBase = lb; mk.colN = p.colN; mk.rowN = p.rowN;
        mk.colSpawn = p.colN; mk.prog = p.colN; // ref. p/ fade posicional (50%→0)
        mk.ready = false;                      // 1º quadro: posiciona sem deslizar
        mk.full = code(8); mk.txt.textContent = ''; mk.shown = 0; mk.charT = 0; // surge 1 a 1
        var c = mk.color || COLORS[ri(COLORS.length)]; // cor definida pela leva
        mk.color = c;
        mk.dot.style.background = '#' + c;     // círculo SÓLIDO (sem blur)
        mk.lead.style.background = '#' + c;
        mk.txt.style.color = '#' + c;
        mk.fade = rr(0.4, 0.7);                // duração dos fades (in/out)
        return true;
      }
      return false; // nenhuma posição válida agora — tenta de novo logo
    }

    // ---- visibilidade por SEÇÃO (lê a página pai; iframe é same-origin) ----
    // O conjunto só aparece nas seções INTERMEDIÁRIAS: some na 1ª (hero) e na última.
    var _mainEl = null, _firstEl = null, _lastEl = null;
    function pageWin() {
      try { return (window.parent && window.parent !== window) ? window.parent : window; }
      catch (e) { return window; }
    }
    function refreshEls(w) {
      try {
        var pdoc = w.document;
        _mainEl = pdoc.querySelector('main');
        _firstEl = _mainEl ? _mainEl.children[0] : null;        // 1ª seção (hero)
        _lastEl = pdoc.querySelector('#lead-form') || pdoc.querySelector('footer'); // última seção
        if (!_lastEl && _mainEl && _mainEl.children.length)
          _lastEl = _mainEl.children[_mainEl.children.length - 1];
      } catch (e) { _mainEl = _firstEl = _lastEl = null; }
    }
    function pageGate() {                 // 1 = seções do meio; 0 = primeira ou última
      try {
        var w = pageWin(), H = w.innerHeight || 1;
        if (!_firstEl || !_lastEl || !_firstEl.isConnected || !_lastEl.isConnected) refreshEls(w);
        if (!_firstEl || !_lastEl) return 0;
        var afterFirst = _firstEl.getBoundingClientRect().bottom <= H * 0.4; // hero já saiu
        var beforeLast = _lastEl.getBoundingClientRect().top >= H * 0.6;     // última ainda não chegou
        return (afterFirst && beforeLast) ? 1 : 0;
      } catch (e) { return 0; }
    }

    var lastT = null, gateAlpha = 0;
    // LEVAS: grupos que aparecem/somem juntos, com tela vazia entre eles
    var waveState = 'gap', waveT = 0, waveGap = 1.0, waveDur = 0, waveN = 0;
    var waveExtra = false, extraA = null, extraB = null; // 30%: uma conexão extra na leva
    CONFIG._onFrame = function (d) {
      var now = (typeof performance !== 'undefined' ? performance.now() : Date.now()) / 1000;
      if (lastT == null) lastT = now;
      var dt = Math.min(0.1, now - lastT); lastT = now;

      // visibilidade global do conjunto conforme a seção atual (fade ~0.5s)
      var gateTarget = pageGate();
      gateAlpha += (gateTarget - gateAlpha) * (1 - Math.exp(-dt / 0.5));
      layer.style.opacity = gateAlpha.toFixed(3);

      // ---- LEVAS: grupos com entrada/saída ESCALONADAS e tela vazia entre eles ----
      waveT += dt;
      if (waveState === 'gap') {
        var allIdle = true;
        for (var ci = 0; ci < markers.length; ci++) if (markers[ci].state !== 'wait') { allIdle = false; break; }
        if (gateTarget && allIdle && waveT >= waveGap) {  // recomeça LOGO APÓS a leva anterior sair
          waveState = 'show'; waveT = 0; waveDur = rr(3.75, 8.25); // 50% mais tempo em tela
          var n = 5, picked = 0, members = [];            // sempre 5 pontos por leva
          for (var qi = 0; qi < markers.length; qi++) {
            var mq2 = markers[qi]; mq2.inWave = false;
            if (picked < n && mq2.state === 'wait') {
              mq2.inWave = true;
              mq2.spawnDelay = rr(0, 1.2);              // atraso de ENTRADA por ponto
              mq2.exitDelay = rr(0, 1.0);               // atraso de SAÍDA por ponto
              members.push(mq2); picked++;
            }
          }
          // cores: palette embaralhado por leva → garante >=3 das 4 cores
          var pal = COLORS.slice();
          for (var ps = pal.length - 1; ps > 0; ps--) { var pj = ri(ps + 1), pt = pal[ps]; pal[ps] = pal[pj]; pal[pj] = pt; }
          for (var mi = 0; mi < members.length; mi++) members[mi].color = pal[mi % pal.length];
          // 30% das levas: um ponto ganha uma conexão extra com outro
          waveExtra = Math.random() < 0.3;
          extraA = extraB = null;
          if (waveExtra && members.length >= 2) {
            var ea = ri(members.length), eb = ri(members.length);
            if (eb === ea) eb = (ea + 1) % members.length;
            extraA = members[ea]; extraB = members[eb];
          }
        }
      } else if (waveT >= waveDur || !gateTarget) {
        waveState = 'gap'; waveT = 0; waveGap = rr(0.1, 0.4); // intervalo curto entre levas
      }

      var rect = canvas.getBoundingClientRect();
      var rx = rect.width / d.width, ry = rect.height / d.height;
      var colSpan = Math.max(6, Math.round(d.cols * 0.05)); // janela de rastreio (horiz.)
      var rowSpan = Math.max(3, Math.round(d.rows * 0.03)); // janela de rastreio (vert.)
      var ease = 1 - Math.exp(-dt / 0.32);                  // suavização temporal

      for (var i = 0; i < markers.length; i++) {
        var mk = markers[i];
        mk.t += dt;
        if (mk.state === 'wait') {
          // nasce só se faz parte da leva atual e após seu atraso de entrada
          if (waveState === 'show' && mk.inWave && gateTarget && waveT >= mk.spawnDelay) {
            var vw = Math.max(1, rect.width), vh = Math.max(1, rect.height);
            var occ = [];
            for (var oj = 0; oj < markers.length; oj++) {
              var mo = markers[oj];
              if (mo.state !== 'wait' && mo.ready) occ.push({ colN: mo.colN, rowN: mo.rowN });
            }
            if (spawn(mk, d, occ, 15 / vw, 15 / vh, 150 / vh, 1 - 150 / vh)) { mk.state = 'in'; mk.t = 0; }
          }
          mk.linked = false; mk.el.style.opacity = '0'; continue;
        }
        // fim da leva: cada ponto sai após o SEU atraso de saída
        if (waveState === 'gap' && (mk.state === 'in' || mk.state === 'live') && waveT >= mk.exitDelay) {
          mk.state = 'out'; mk.t = 0;
        }

        // caracteres do código surgem um a um (0.1s cada)
        if (mk.shown < 8) {
          mk.charT += dt;
          while (mk.shown < 8 && mk.charT >= 0.1) { mk.charT -= 0.1; mk.shown++; }
          mk.txt.textContent = mk.full.slice(0, mk.shown);
        }

        // segue a linha (X) com a vertical TRAVADA, derivando p/ a ESQUERDA
        var target = d.hMin + d.span * ((((mk.levelBase + d.flow) % 1) + 1) % 1);
        var prefColN = mk.colN - LEFT_DRIFT * dt;
        if (prefColN <= 0) {                     // chegou na borda esquerda: recicla
          mk.state = 'wait'; mk.t = 0; mk.dur = rr(0.4, 2.5); mk.linked = false;
          mk.el.style.opacity = '0'; continue;
        }
        var p = findOnLevel(d, target, prefColN, mk.rowN, colSpan, rowSpan);
        var tx;
        if (p) { mk.colN = p.colN; tx = rect.left + p.bx * rx; }
        else { mk.colN = prefColN; tx = rect.left + prefColN * (d.cols - 1) * d.cell * rx; }
        var ty = rect.top + (mk.rowN * (d.rows - 1)) * d.cell * ry; // altura fixa (sem tremor)
        if (!mk.ready) { mk.dx = tx; mk.dy = ty; mk.ready = true; }
        else { mk.dx += (tx - mk.dx) * ease; }
        mk.dy = ty;                              // vertical travado
        mk.cx = mk.dx; mk.cy = mk.dy;

        // ciclo de vida ALEATÓRIO (nasce/morre) × fade POSICIONAL (50%→0 p/ esq.)
        var lf;                                  // fator do ciclo de vida (0..1)
        if (mk.state === 'in') {
          lf = Math.min(1, mk.t / mk.fade);
          if (mk.t >= mk.fade) { mk.state = 'live'; mk.t = 0; }
        } else if (mk.state === 'live') {
          lf = 1;                                // vive até o fim da leva
        } else {                                 // out
          lf = Math.max(0, 1 - mk.t / mk.fade);
          if (mk.t >= mk.fade) {
            mk.state = 'wait'; mk.t = 0; mk.dur = rr(0.6, 3.5); mk.linked = false;
            mk.el.style.opacity = '0'; continue;
          }
        }
        mk.prog = Math.min(mk.prog, prefColN);   // progresso monotônico p/ esquerda
        var posF = Math.max(0, Math.min(1, mk.prog / mk.colSpawn));
        mk.op = posF * lf;                       // envelope (posição × vida) — DOT sólido

        mk.el.style.transform = 'translate(' + mk.cx + 'px,' + mk.cy + 'px)';
        mk.el.style.opacity = (0.35 * mk.op).toFixed(3); // conjunto a 35%
        mk.linked = mk.op > 0.02;
      }

      // conecta os marcadores visíveis com segmentos em degradê (cor→cor)
      var vis = [];
      for (var q = 0; q < markers.length; q++) {
        var mq = markers[q];
        if (mq.linked) vis.push({ x: mq.cx, y: mq.cy, op: mq.op, c: mq.color, key: mq.colSpawn, m: mq });
      }
      vis.sort(function (a, b) { return a.key - b.key; }); // ordem FIXA (colSpawn não muda)
      var edges = [];
      for (var e1 = 0; e1 < vis.length - 1; e1++) edges.push([e1, e1 + 1]); // cadeia
      // 30% das levas: um ponto com uma conexão EXTRA a outro
      if (waveExtra && extraA && extraB) {
        var ia = -1, ib = -1;
        for (var xi = 0; xi < vis.length; xi++) { if (vis[xi].m === extraA) ia = xi; if (vis[xi].m === extraB) ib = xi; }
        if (ia >= 0 && ib >= 0) edges.push([ia, ib]);
      }
      for (var s = 0; s < segs.length; s++) {
        var sg = segs[s];
        if (s < edges.length) {
          var va = vis[edges[s][0]], vb = vis[edges[s][1]];
          sg.line.setAttribute('x1', va.x.toFixed(1)); sg.line.setAttribute('y1', va.y.toFixed(1));
          sg.line.setAttribute('x2', vb.x.toFixed(1)); sg.line.setAttribute('y2', vb.y.toFixed(1));
          sg.grad.setAttribute('x1', va.x.toFixed(1)); sg.grad.setAttribute('y1', va.y.toFixed(1));
          sg.grad.setAttribute('x2', vb.x.toFixed(1)); sg.grad.setAttribute('y2', vb.y.toFixed(1));
          sg.s0.setAttribute('stop-color', '#' + va.c);
          sg.s1.setAttribute('stop-color', '#' + vb.c);
          sg.line.setAttribute('stroke-opacity', (Math.min(va.op, vb.op) * 0.35).toFixed(3)); // 35%
          sg.line.style.display = '';
        } else {
          sg.line.style.display = 'none';
        }
      }
    };
  })();

  window.MeshBackground.mount('#mesh-bg', CONFIG);
</script>
</body>
</html>
